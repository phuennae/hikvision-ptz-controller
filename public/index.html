<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV MONITORING</title>
    <script src="https://cdn.jsdelivr.net/gh/phoboslab/jsmpeg@master/jsmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; margin: 0; padding-top: 20px; }
        .dashboard { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        
        .d-pad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 10px; justify-content: center; margin: 0 auto; }
        .btn { border: 2px solid #007bff; background: white; font-size: 24px; border-radius: 10px; cursor: pointer; color: #007bff; transition: 0.1s; user-select: none; }
        .btn:active { background: #007bff; color: white; transform: scale(0.95); }
        .btn.up { grid-column: 2; grid-row: 1; }
        .btn.left { grid-column: 1; grid-row: 2; }
        .btn.stop { grid-column: 2; grid-row: 2; font-size: 14px; font-weight: bold; background: #ff4d4f; color: white; border: none; }
        .btn.stop:active { background: #d9363e; }
        .btn.right { grid-column: 3; grid-row: 2; }
        .btn.down { grid-column: 2; grid-row: 3; }
        #status { color: #666; font-size: 14px; margin-top: 15px; }

        /* กรอบสำหรับแสดงวิดีโอ */
        #video-canvas { 
            width: 640px; 
            height: 360px; 
            background-color: #000; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>📷 CCTV MONITORING</h2>

        <div style="width: 640px; margin: 0 auto 5px auto; text-align: right;">
            <button onclick="openFullscreen('video-canvas')" style="padding: 5px 10px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #eee;">🔲 ขยายเต็มจอ</button>
        </div>

        <canvas id="video-canvas"></canvas>
        
        <div class="d-pad">
            <button class="btn up" onmousedown="sendCommand('up')" onmouseup="sendCommand('stop')">⬆️</button>
            <button class="btn left" onmousedown="sendCommand('left')" onmouseup="sendCommand('stop')">⬅️</button>
            <button class="btn stop" onclick="sendCommand('stop')">STOP</button>
            <button class="btn right" onmousedown="sendCommand('right')" onmouseup="sendCommand('stop')">➡️</button>
            <button class="btn down" onmousedown="sendCommand('down')" onmouseup="sendCommand('stop')">⬇️</button>
        </div>
        <p id="status">ระบบพร้อมใช้งาน</p>
    </div>

    <div class="dashboard" style="margin-top: 20px;">
        <h2>⏳ ดูภาพย้อนหลัง (Playback จาก SD Card)</h2>
        
        <div style="margin-bottom: 15px;">
            <label>เริ่มต้น: </label>
            <input type="datetime-local" id="playback-start" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
            <label style="margin-left: 10px;">สิ้นสุด: </label>
            <input type="datetime-local" id="playback-end" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
            <button onclick="initPlayback()" style="margin-left: 10px; padding: 6px 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">🔍 ค้นหาไฟล์</button>
        </div>

        <div style="width: 640px; margin: 0 auto 5px auto; text-align: right;">
            <button onclick="openFullscreen('playback-canvas')" style="padding: 5px 10px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #eee;">🔲 ขยายเต็มจอ</button>
        </div>

        <canvas id="playback-canvas" style="width: 640px; height: 360px; background-color: #000; border-radius: 8px; display: block; margin: 0 auto;"></canvas>
        
        <div style="width: 640px; margin: 15px auto 0 auto; text-align: left;">
            <input type="range" id="playback-slider" min="0" max="100" value="0" onchange="onSliderScrub(this.value)" style="width: 100%; cursor: pointer; margin-bottom: 10px;">
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <button id="btn-play-pause" onclick="togglePlayPause()" style="padding: 6px 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px;">⏸️ Pause</button>
                    
                    <select id="playback-speed" onchange="changeSpeed(this.value)" style="padding: 5px; border-radius: 5px;">
                        <option value="1">ความเร็ว 1x</option>
                        <option value="2">ความเร็ว 2x</option>
                        <option value="4">ความเร็ว 4x</option>
                    </select>
                </div>
                <span id="playback-time-display" style="font-family: monospace; font-size: 14px; color: #333;">00:00:00 / 00:00:00</span>
            </div>
        </div>

        <p id="playback-status" style="color: #666; font-size: 14px; margin-top: 10px;">สถานะ: เลือกเวลาแล้วกดค้นหา</p>
    </div>

    <script>
        // --- ส่วนที่ 1: ตั้งค่าและเชื่อมต่อสตรีมภาพสด (Live View) แบบลิงก์เดียว ---
        var canvas = document.getElementById('video-canvas');
        const wsProtocolLive = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var url = wsProtocolLive + '//' + location.host + '/ws-live';
        var player = new JSMpeg.Player(url, { canvas: canvas, autoplay: true });

        // --- ส่วนที่ 2: ฟังก์ชันสั่งกล้อง PTZ ---
        function sendCommand(cmd) {
            document.getElementById('status').innerText = 'สถานะ: ' + cmd.toUpperCase();
            fetch('/api/ptz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            }).catch(e => console.error(e));
        }

        // --- เพิ่มระบบควบคุมผ่าน Keyboard ---
        let isKeyPressed = false;

        window.addEventListener('keydown', function(event) {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
                event.preventDefault(); // เบรกหน้าจอไม่ให้เลื่อน
            }
            if (isKeyPressed) return;

            switch(event.key) {
                case 'ArrowUp': isKeyPressed = true; sendCommand('up'); break;
                case 'ArrowDown': isKeyPressed = true; sendCommand('down'); break;
                case 'ArrowLeft': isKeyPressed = true; sendCommand('left'); break;
                case 'ArrowRight': isKeyPressed = true; sendCommand('right'); break;
            }
        });

        window.addEventListener('keyup', function(event) {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
                isKeyPressed = false; 
                sendCommand('stop');   
            }
        });

        // --- ส่วนที่ 3: ระบบควบคุม Playback & Timeline ---
        let playbackPlayer = null;
        let playbackTimer = null;

        let originStartTime = null;
        let originEndTime = null;
        let currentPositionSeconds = 0;
        let totalDurationSeconds = 0;
        let currentSpeed = 1;
        let isPlaying = false;

        function initPlayback() {
            const startVal = document.getElementById('playback-start').value;
            const endVal = document.getElementById('playback-end').value;

            if (!startVal || !endVal) {
                alert('กรุณาเลือกช่วงเวลาเริ่มต้นและสิ้นสุดก่อนครับ');
                return;
            }

            originStartTime = new Date(startVal);
            originEndTime = new Date(endVal);
            
            totalDurationSeconds = Math.floor((originEndTime - originStartTime) / 1000);
            
            if (totalDurationSeconds <= 0) {
                alert('เวลาสิ้นสุดต้องมากกว่าเวลาเริ่มต้นนะครับ');
                return;
            }

            currentPositionSeconds = 0;
            document.getElementById('playback-slider').max = totalDurationSeconds;
            document.getElementById('playback-slider').value = 0;
            document.getElementById('playback-speed').value = "1";
            currentSpeed = 1;

            startStreamAtPosition();
        }

        function startStreamAtPosition() {
            const statusTxt = document.getElementById('playback-status');
            clearInterval(playbackTimer); 

            const targetStartTime = new Date(originStartTime.getTime() + (currentPositionSeconds * 1000));
            const startTimeISO = targetStartTime.toISOString();
            const endTimeISO = originEndTime.toISOString();

            statusTxt.innerText = `🔍 กำลังโหลดวิดีโอ ณ จุดเวลาเลื่อน (ความเร็ว ${currentSpeed}x)...`;

            fetch('/api/playback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ startTime: startTimeISO, endTime: endTimeISO, speed: currentSpeed })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    statusTxt.innerText = '✅ กำลังเล่นภาพย้อนหลัง...';
                    isPlaying = true;
                    document.getElementById('btn-play-pause').innerText = '⏸️ Pause';

                    if (playbackPlayer) playbackPlayer.destroy();
                    
                    // เชื่อมต่อไปยังสตรีมภาพย้อนหลัง (Playback) แบบลิงก์เดียว
                    const wsProtocolPlayback = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const wsUrl = wsProtocolPlayback + '//' + location.host + '/ws-playback';
                    const canvas = document.getElementById('playback-canvas');
                    playbackPlayer = new JSMpeg.Player(wsUrl, { canvas: canvas, autoplay: true });

                    runTimelineTimer();
                } else {
                    statusTxt.innerText = '❌ ' + (data.error || 'เกิดข้อผิดพลาด');
                }
            }).catch(err => console.error(err));
        }

        function runTimelineTimer() {
            playbackTimer = setInterval(() => {
                if (isPlaying && currentPositionSeconds < totalDurationSeconds) {
                    currentPositionSeconds += currentSpeed; 
                    if (currentPositionSeconds > totalDurationSeconds) currentPositionSeconds = totalDurationSeconds;

                    document.getElementById('playback-slider').value = currentPositionSeconds;
                    updateTimeDisplay();
                } else if (currentPositionSeconds >= totalDurationSeconds) {
                    clearInterval(playbackTimer);
                    document.getElementById('playback-status').innerText = '🏁 เล่นจบช่วงเวลาที่เลือกแล้ว';
                }
            }, 1000);
        }

        function updateTimeDisplay() {
            const format = (sec) => {
                const h = Math.floor(sec / 3600).toString().padStart(2, '0');
                const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
                const s = (sec % 60).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };
            document.getElementById('playback-time-display').innerText = `${format(currentPositionSeconds)} / ${format(totalDurationSeconds)}`;
        }

        function onSliderScrub(value) {
            currentPositionSeconds = parseInt(value);
            updateTimeDisplay();
            startStreamAtPosition();
        }

        function togglePlayPause() {
            const btn = document.getElementById('btn-play-pause');
            if (isPlaying) {
                if (playbackPlayer) playbackPlayer.pause();
                isPlaying = false;
                btn.innerText = '▶️ Play';
                document.getElementById('playback-status').innerText = '⏸️ หยุดชั่วคราว';
            } else {
                if (playbackPlayer) playbackPlayer.play();
                isPlaying = true;
                btn.innerText = '⏸️ Pause';
                document.getElementById('playback-status').innerText = '✅ กำลังเล่นภาพย้อนหลัง...';
            }
        }

        function changeSpeed(value) {
            currentSpeed = parseInt(value);
            startStreamAtPosition();
        }

        function openFullscreen(canvasId) {
            const elem = document.getElementById(canvasId);
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { 
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { 
                elem.msRequestFullscreen();
            }
        }
    </script>
</body>
</html>
